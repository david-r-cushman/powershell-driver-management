permissions:
  contents: read

name: Pester

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Ensure Pester is available
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pesterVersion = '5.7.1'

          $psGallery = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
          if (-not $psGallery) {
              Register-PSRepository -Default
              $psGallery = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
              if (-not $psGallery) {
                  throw 'PSGallery repository is unavailable after Register-PSRepository -Default.'
              }
          }

          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          Install-Module -Name Pester -Repository PSGallery -RequiredVersion $pesterVersion -Force -Scope CurrentUser
          Import-Module Pester -RequiredVersion $pesterVersion -Force
          Get-Module Pester -ListAvailable | Where-Object Version -eq $pesterVersion | Select-Object -First 1 Name, Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'Tests/Unit/Uninstall-DisplayDrivers.Tests.ps1'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestRegistry.Enabled = $false
          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) {
              throw "Pester reported $($result.FailedCount) failed test(s)."
          }
